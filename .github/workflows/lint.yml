name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  flake8:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: |
          flake8 risk_logger.py scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402,E221,E241 \
            --exclude=__pycache__
